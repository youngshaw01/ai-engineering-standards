# Project Profile
# Copy this file to your project as .standards/profile.yaml
# The .standards directory is gitignored by default

project:
  name: my-project
  description: Brief description of the project

type:
  # new — start from scratch, apply all standards from day one
  # legacy — existing codebase, adopt standards incrementally
  type: new

version_control:
  # git — new projects, open source, internet teams
  # svn — legacy enterprise projects (finance, government, internal networks)
  # git-svn — SVN→Git migration transition period
  # none — no version control (not recommended, but supported)
  type: git

technology:
  backend:
    - java          # java | python | go | nodejs | ...
  frontend:
    - vue           # react | vue | angular | ...
  database:
    - mysql        # mysql | postgresql | mongodb | redis | ...
  ai_tool:
    - cursor       # cursor | trae | claude-code | codex | none

architecture:
  style:
    - monolith     # monolith | microservice | ddd | event-driven

standards:
  level: standard   # standard | strict

rules:
  include:
    # Core rules (always recommended)
    - safety            # Security, sensitive data, deletion protection
    - vcs               # Version control (Git.md or SVN.md, based on version_control.type)
    - coding            # Coding conventions for your language
    - api               # API design patterns
    - testing           # Testing strategy

  exclude:
    # Architecture rules — only if you're actually using them
    - ddd               # Exclude if not doing DDD
    - microservice      # Exclude if not microservices
    - kubernetes        # Exclude if not on K8S
    - event-driven      # Exclude if not event-driven
